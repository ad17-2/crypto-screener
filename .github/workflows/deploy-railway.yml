name: Deploy Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: railway-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python modules
        run: python -m py_compile crypto_screener/*.py

      - name: Check Ruff lint
        run: python -m ruff check .

      - name: Check Ruff format
        run: python -m ruff format --check .

      - name: Check Python types
        run: python -m mypy crypto_screener

      - name: Check dashboard JavaScript
        run: node --check crypto_screener/dashboard_static/dashboard.js

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: b8d5cc94-f757-4a1f-a673-5f8ff4998dff
      RAILWAY_ENVIRONMENT_ID: 9f55bf69-76ce-4242-8629-e74be0650edb
      RAILWAY_SERVICE_ID: 1ca82e37-189e-484b-877a-9bb236fb2ca8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: >
          railway up
          --detach
          --project "$RAILWAY_PROJECT_ID"
          --environment "$RAILWAY_ENVIRONMENT_ID"
          --service "$RAILWAY_SERVICE_ID"
          --message "GitHub Actions deploy ${GITHUB_SHA}"

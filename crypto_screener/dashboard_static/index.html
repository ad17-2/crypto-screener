<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crypto Dashboard</title>
  <link rel="stylesheet" href="/assets/dashboard.css">
  <script>
    (function () {
      try {
        var prefs = JSON.parse(localStorage.getItem("tape.prefs") || "{}");
        if (prefs.theme === "light") document.documentElement.setAttribute("data-theme", "light");
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <main class="w-[min(1480px,calc(100vw-32px))] max-[680px]:w-[min(100vw-20px,1480px)] mx-auto pt-[22px] max-[680px]:pt-3.5 pb-[34px]">
    <div class="flex items-start justify-between gap-4 mb-[18px] max-[680px]:flex-col max-[680px]:items-stretch">
      <div>
        <h1 class="m-0 text-base font-semibold uppercase tracking-wide leading-tight">Crypto Dashboard</h1>
        <div class="text-muted text-[13px] mt-1.5" id="generated">Loading latest run</div>
      </div>
      <div class="flex gap-2 items-center flex-wrap justify-end max-[680px]:justify-stretch">
        <select id="runSelect" class="h-9 border border-line bg-panel text-ink rounded-md px-2.5 text-[13px] font-inherit max-[680px]:w-full" aria-label="Run"></select>
        <button id="themeToggle" class="theme-btn h-9 border border-line bg-panel text-ink rounded-md px-2.5 text-[13px] font-inherit cursor-pointer font-semibold min-w-10 max-[680px]:w-full" type="button" aria-label="Toggle color theme">Theme</button>
        <button id="reload" class="h-9 border border-line bg-panel text-ink rounded-md px-2.5 text-[13px] font-inherit cursor-pointer font-semibold max-[680px]:w-full" type="button">Reload</button>
      </div>
    </div>
    <section class="grid grid-cols-[repeat(6,minmax(130px,1fr))] max-[1100px]:grid-cols-[repeat(3,minmax(130px,1fr))] max-[680px]:grid-cols-2 gap-2 mb-3" id="metrics"></section>
    <section class="dashboard-grid">
      <section class="panel watch-panel" aria-label="Watchlist workbench">
        <div class="panel-head">
          <h2>Watchlist</h2>
          <div class="head-tools">
            <button id="densityToggle" class="density-btn" type="button" aria-label="Toggle row density">Comfortable</button>
            <span class="count" id="watchCount">-</span>
          </div>
        </div>
        <div class="watch-tabs" id="watchTabs"></div>
        <div class="watch-controls">
          <input class="filter-input" id="symbolFilter" type="search" placeholder="Filter symbol or setup" aria-label="Filter symbol or setup">
          <select class="filter-select" id="qualityFilter" aria-label="Minimum quality">
            <option value="0">Q 0+</option>
            <option value="50">Q 50+</option>
            <option value="75">Q 75+</option>
            <option value="90">Q 90+</option>
          </select>
          <select class="filter-select" id="sourceFilter" aria-label="Source">
            <option value="all">All sources</option>
          </select>
          <select class="filter-select" id="volumeFilter" aria-label="Minimum volume">
            <option value="0">Any volume</option>
            <option value="20000000">$20M+</option>
            <option value="100000000">$100M+</option>
            <option value="1000000000">$1B+</option>
          </select>
          <label class="filter-toggle"><input id="positiveOiFilter" type="checkbox"> OI &gt; 0</label>
          <label class="filter-toggle"><input id="negativeFundingFilter" type="checkbox"> Funding &lt; 0</label>
        </div>
        <div class="watch-table" id="watchTable"></div>
      </section>
      <aside class="detail-rail">
        <div class="panel" id="detailPanel"></div>
      </aside>
    </section>
    <section class="module-grid" aria-label="Dashboard context">
      <div id="providerPanel"></div>
      <div id="qualityPanel"></div>
      <div id="validationPanel"></div>
      <div id="weightsPanel"></div>
      <div id="runsPanel"></div>
      <div id="sectorPanel"></div>
    </section>
  </main>
  <script src="/assets/dashboard.js" defer></script>
</body>
</html>
